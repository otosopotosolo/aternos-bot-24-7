version: '3.8'

services:
  playwright-browser:
    build:
      context: .
      dockerfile: freebuff/Dockerfile.playwright
    container_name: sarahack-browser
    environment:
      - HACKERONE_EMAIL=potosopotosolo@gmail.com
      - HACKERONE_PASSWORD='#)a9By=*D#6/w9T'
      - H1_API_IDENTIFIER=${H1_API_IDENTIFIER:-}
      - H1_API_TOKEN=${H1_API_TOKEN:-}
      - CHROME_BIN=/usr/bin/google-chrome
      - PLAYWRIGHT_CHROMIUM_ARGS=--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage
    volumes:
      - ./reports:/app/reports
      - ./freebuff:/app/freebuff
    working_dir: /app
    shm_size: 2gb

networks:
  default:
    name: sarahack-net